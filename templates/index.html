<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 Crop Prediction</h1>
            <p>Predict the best crop for your field conditions</p>
        </div>

        <div class="form-section">
            <div class="error" id="errorMessage"></div>

            <form id="predictionForm">
                <div class="input-group">
                    <div class="form-group">
                        <label for="nitrogen">
                            Nitrogen (N)
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Nitrogen content in soil (mg/kg)</span>
                            </span>
                        </label>
                        <input type="number" id="nitrogen" name="nitrogen" placeholder="0" min="0" required>
                        <div class="form-hint">mg/kg</div>
                    </div>

                    <div class="form-group">
                        <label for="phosphorus">
                            Phosphorus (P)
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Phosphorus content in soil (mg/kg)</span>
                            </span>
                        </label>
                        <input type="number" id="phosphorus" name="phosphorus" placeholder="0" min="0" required>
                        <div class="form-hint">mg/kg</div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="form-group">
                        <label for="potassium">
                            Potassium (K)
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Potassium content in soil (mg/kg)</span>
                            </span>
                        </label>
                        <input type="number" id="potassium" name="potassium" placeholder="0" min="0" required>
                        <div class="form-hint">mg/kg</div>
                    </div>

                    <div class="form-group">
                        <label for="temperature">
                            Temperature
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Average temperature in Celsius</span>
                            </span>
                        </label>
                        <input type="number" id="temperature" name="temperature" placeholder="25" step="0.1" min="-50" max="60" required>
                        <div class="form-hint">°C</div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="form-group">
                        <label for="humidity">
                            Humidity
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Relative humidity percentage</span>
                            </span>
                        </label>
                        <input type="number" id="humidity" name="humidity" placeholder="50" step="0.1" min="0" max="100" required>
                        <div class="form-hint">%</div>
                    </div>

                    <div class="form-group">
                        <label for="ph">
                            pH
                            <span class="tooltip">
                                <span class="info-icon">?</span>
                                <span class="tooltip-text">Soil pH level (0-14)</span>
                            </span>
                        </label>
                        <input type="number" id="ph" name="ph" placeholder="7" step="0.1" min="0" max="14" required>
                        <div class="form-hint">0-14</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rainfall">
                        Rainfall
                        <span class="tooltip">
                            <span class="info-icon">?</span>
                            <span class="tooltip-text">Annual rainfall in mm</span>
                        </span>
                    </label>
                    <input type="number" id="rainfall" name="rainfall" placeholder="100" step="0.1" min="0" required>
                    <div class="form-hint">mm</div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-predict" id="predictBtn">Predict Crop</button>
                    <button type="reset" class="btn-reset">Clear Form</button>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing your data...</p>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-title">Prediction Result</div>
                <div class="result-crop">
                    <div class="success-icon">✓</div>
                    <div class="result-crop-name" id="cropName">Rice</div>
                    <div class="result-crop-confidence">
                        Confidence: <span id="confidence">85</span>%
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
